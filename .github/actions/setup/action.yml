name: Setup
description: Setup
runs:
  using: composite
  steps:
    - name: Setup Node.js 🔠
      uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
      with:
        node-version-file: package.json

    - name: Install Dependencies 🪛
      shell: bash
      run: corepack enable && pnpm install
