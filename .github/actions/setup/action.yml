name: Setup
description: Setup
runs:
  using: composite
  steps:
    - name: Setup Node.js 🔠
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version-file: package.json

    - name: Install Dependencies 🪛
      shell: bash
      run: corepack enable && pnpm install
